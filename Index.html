<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archery Scoring Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" id="pwa-manifest">
<style>
:root{
  --bg:#f0f4fa;--card:#ffffff;--text:#1f2933;--accent:#3b82f6;
  --soft:#e5e9f2;--danger:#ef4444;--success:#22c55e;
  --gold:#f59e0b;--silver:#94a3b8;--bronze:#b45309;--border:#d1d5db;
}
body.dark{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--accent:#60a5fa;--soft:#334155;--border:#475569;}
*{box-sizing:border-box;}
html{font-size:120%;}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:var(--card);box-shadow:0 2px 6px rgba(0,0,0,0.08);position:sticky;top:0;z-index:100;}
.topbar-title{font-weight:900;font-size:1.1rem;letter-spacing:0.01em;}
.topbar-btns{display:flex;gap:8px;}

.comp-banner{display:none;background:var(--accent);color:#fff;text-align:center;padding:10px 24px;font-size:1.1rem;font-weight:800;letter-spacing:0.02em;}
.comp-banner.visible{display:block;}
body.dark .comp-banner{background:#1d4ed8;}

.section{background:var(--card);padding:16px 18px;margin:10px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.section-title{font-weight:bold;font-size:0.85rem;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}

.container{display:flex;padding:10px 10px 24px;gap:12px;flex-wrap:wrap;}
.left{background:var(--card);border-radius:12px;padding:16px;min-width:230px;flex:0 0 260px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.right{background:var(--card);border-radius:12px;padding:16px;flex:1;min-width:320px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.hidden{display:none!important;}

button{background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:0.85rem;transition:opacity 0.15s,background 0.15s;}
button:hover{opacity:0.88;}
button:disabled{opacity:0.4;cursor:not-allowed;}
button.danger{background:var(--danger);}
button.ghost{background:var(--soft);color:var(--text);}
button.success{background:var(--success);}
button.sm{padding:4px 9px;font-size:0.78rem;}

input,textarea,select{border-radius:8px;border:1px solid var(--border);padding:7px 9px;background:var(--card);color:var(--text);font-size:0.85rem;}
input:focus,textarea:focus,select:focus{outline:2px solid var(--accent);border-color:var(--accent);}

.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:0.88rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;opacity:0;transform:translateY(12px);transition:opacity 0.25s,transform 0.25s;pointer-events:none;max-width:340px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-left:4px solid var(--success);}
.toast.error{border-left:4px solid var(--danger);}

.archer-list{list-style:none;padding:0;margin:8px 0 0;}
.archer-list li{padding:8px 10px;margin:3px 0;background:var(--soft);border-radius:8px;cursor:pointer;font-size:0.85rem;transition:background 0.15s;}
.archer-list li:hover{background:var(--accent);color:#fff;}
.archer-list li.active{background:var(--accent);color:#fff;}

.score-input{width:38px;height:38px;text-align:center;font-size:0.95rem;font-weight:bold;padding:0;}
.end-block{margin-bottom:10px;padding:10px;background:var(--soft);border-radius:8px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.end-label{font-size:0.78rem;color:var(--accent);font-weight:bold;min-width:52px;}

.status-bar{display:flex;gap:16px;align-items:center;padding:10px 14px;background:var(--soft);border-radius:8px;margin-bottom:10px;flex-wrap:wrap;}
.status-check{display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:600;cursor:pointer;}

#grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){#grid{grid-template-columns:1fr;}}

.lb-group{margin-bottom:16px;}
.lb-group h4{margin:0 0 6px;font-size:0.9rem;color:var(--accent);}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;font-size:0.85rem;margin:2px 0;background:var(--soft);}
.lb-row.gold{background:#fef3c7;color:#92400e;}
.lb-row.silver{background:#f1f5f9;color:#475569;}
.lb-row.bronze{background:#fdf4e7;color:#92400e;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;justify-content:center;align-items:flex-start;padding-top:40px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);padding:0;border-radius:14px;width:640px;max-width:96vw;box-shadow:0 8px 40px rgba(0,0,0,0.25);max-height:88vh;display:flex;flex-direction:column;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--soft);}
.modal-header h2{margin:0;font-size:1.05rem;}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--soft);display:flex;justify-content:flex-end;gap:8px;}

.tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:2px solid var(--soft);}
.tab{padding:8px 14px;border-radius:8px 8px 0 0;cursor:pointer;font-size:0.85rem;background:none;color:var(--text);border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500;}
.tab.active{border-bottom:2px solid var(--accent);color:var(--accent);}

.settings-group{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--soft);}
.settings-group-title{font-weight:bold;font-size:0.9rem;color:var(--accent);margin-bottom:6px;}

.round-card{background:var(--soft);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.round-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.round-card-title{font-weight:bold;font-size:0.9rem;}
.round-form{background:var(--soft);border-radius:10px;padding:14px;margin-top:10px;}
.round-form .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.round-form label{font-size:0.8rem;font-weight:bold;display:block;margin-bottom:3px;}
.round-form .full{grid-column:1/-1;}

.save-state{font-size:0.75rem;padding:3px 8px;border-radius:12px;font-weight:bold;}
.save-state.saved{background:#dcfce7;color:#166534;}
.save-state.unsaved{background:#fee2e2;color:#991b1b;}

.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:0.75rem;font-weight:bold;background:var(--soft);}
.badge.indoor{background:#dbeafe;color:#1e40af;}
.badge.outdoor{background:#dcfce7;color:#14532d;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-title" id="topTitle">🎯 Archery Scoring Pro</div>
  <div class="topbar-btns">
    <span id="cloudStatus" style="font-size:0.72rem;opacity:0.8;align-self:center;">☁️ Offline</span>
    <span id="saveState" class="save-state hidden"></span>
    <button onclick="openSettings()">⚙️ Settings</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div class="comp-banner" id="compBanner"></div>

<div class="section">
  <div class="section-title">Competition</div>
  <div class="row">
    <input id="compName" placeholder="Competition Name" style="flex:1;min-width:160px;">
    <input type="date" id="compDate" style="min-width:140px;">
    <select id="compRound" style="min-width:160px;"></select>
    <button onclick="createCompetition()">➕ Create</button>
  </div>
  <div class="row" style="margin-top:10px;">
    <select id="compSelect" style="flex:1;min-width:160px;" onchange="updateCompButtons()"></select>
    <button id="loadBtn" onclick="loadCompetition()" disabled>📂 Load</button>
    <button id="deleteBtn" class="danger" onclick="deleteCompetition()" disabled>🗑 Delete</button>
  </div>
</div>

<div id="roundInfo" class="section hidden">
  <div class="section-title">Active Round</div>
  <div id="roundInfoContent" class="row" style="gap:8px;flex-wrap:wrap;"></div>
  <div id="leaderboardButtons" class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap;"></div>
</div>

<div class="container">
  <div class="left hidden" id="archerPanel">
    <div class="section-title">Archers</div>
    <textarea id="csv" rows="4" placeholder="Name,Age,Category,Bow&#10;e.g. Alice,Adult,Senior,Recurve"></textarea>
    <button onclick="loadCSV()" style="width:100%;margin-top:6px;">📥 Import CSV</button>
    <div style="margin-top:6px;font-size:0.75rem;" id="csvError"></div>
    <input id="archerSearch" placeholder="🔍 Filter archers by name…" style="width:100%;margin-top:10px;" oninput="filterArchers()" autocomplete="off">
    <ul class="archer-list" id="archers"></ul>
  </div>

  <div class="right hidden" id="mainPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <h3 style="margin:0;font-size:1.05rem;" id="active">Select an Archer</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="ghost sm hidden" id="editArcherBtn" onclick="openEditArcher()">✏️ Edit</button>
        <button class="danger sm hidden" id="deleteArcherBtn" onclick="confirmDeleteArcher()">🗑 Remove</button>
        <button class="success hidden" id="saveBtn" onclick="saveScores()">💾 Save</button>
        <button class="ghost hidden" id="discardBtn" onclick="discardScores()">✖ Discard</button>
      </div>
    </div>

    <div class="status-bar hidden" id="statusBar">
      <label class="status-check"><input type="checkbox" id="chkDNS" onchange="toggleStatus('dns')"> <span style="color:var(--danger);">DNS</span></label>
      <label class="status-check"><input type="checkbox" id="chkRET" onchange="toggleStatus('ret')"> <span style="color:var(--gold);">RET</span></label>
    </div>

    <div id="grid"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:10px;background:var(--soft);border-radius:8px;">
      <span>Running Total</span>
      <strong id="total" style="font-size:1.3rem;">0</strong>
    </div>
    <h3 style="margin-top:20px;">Leaderboard</h3>
    <div id="leaderboards"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target.id==='settingsOverlay')closeSettings()">
  <div class="modal">
    <div class="modal-header"><h2>⚙️ Settings & Cloud</h2><button class="ghost sm" onclick="closeSettings()">✕</button></div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('archersetup',this)">Archer Setup</button>
        <button class="tab" onclick="switchTab('rounds',this)">Round Types</button>
        <button class="tab" onclick="switchTab('cloud',this)">Cloud Sync</button>
      </div>
      
      <div id="tab-cloud" class="tab-panel hidden">
        <div class="settings-group">
          <div class="settings-group-title">Supabase Cloud Sync</div>
          <p style="font-size:0.82rem;opacity:0.75;">Project URL: <b>https://vsuiqorpvhebxkryrqyp.supabase.co</b></p>
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
            <label style="font-size:0.75rem;font-weight:bold;">Anon API Key</label>
            <input id="cloud_key" type="password" placeholder="Paste your Supabase Anon Key here...">
            <button onclick="saveCloudConfig()" class="success">Connect & Sync</button>
          </div>
        </div>
      </div>

      <div id="tab-archersetup" class="tab-panel">
        <div class="settings-group">
          <div class="settings-group-title">Categories</div>
          <div id="categoryList"></div>
          <div class="row"><input id="cf_name" placeholder="New Category"><button onclick="saveCategory()">Add</button></div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">Bow Types</div>
          <div id="bowTypeList"></div>
          <div class="row"><input id="bf_name" placeholder="New Bow Type"><button onclick="saveBowType()">Add</button></div>
        </div>
      </div>

      <div id="tab-rounds" class="tab-panel hidden">
        <div id="roundList"></div>
        <div class="round-form">
          <div class="form-grid">
            <div class="full"><label>Round Name</label><input id="rf_name"></div>
            <div><label>Distance</label><input id="rf_distance" type="number"></div>
            <div><label>Arrows/End</label><input id="rf_perEnd" type="number"></div>
            <div><label>Total Arrows</label><input id="rf_total" type="number"></div>
          </div>
          <button onclick="saveRound()" style="margin-top:10px;width:100%;">Save Round</button>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button onclick="closeSettings()">Close</button></div>
  </div>
</div>

<script>
let comp=null, archers=[], current=null, data=[], savedData=[], unsaved=false;
const SUPABASE_URL = "https://vsuiqorpvhebxkryrqyp.supabase.co";
let cloudConfig = JSON.parse(localStorage.getItem('cloudConfig') || '{"key":""}');

async function cloudRequest(path, method = 'GET', body = null) {
  if (!cloudConfig.key) return null;
  const headers = {
    'apikey': cloudConfig.key,
    'Authorization': `Bearer ${cloudConfig.key}`,
    'Content-Type': 'application/json',
    'Prefer': 'resolution=merge-duplicates'
  };
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/archery_data${path}`, { method, headers, body: body ? JSON.stringify(body) : null });
    return method === 'GET' ? await res.json() : res.ok;
  } catch (e) { return null; }
}

async function syncToCloud(id, content) {
  const ok = await cloudRequest(`?id=eq.${id}`, 'POST', { id, content });
  document.getElementById('cloudStatus').innerText = ok ? '☁️ Cloud Synced' : '⚠️ Offline';
}

async function loadFromCloud() {
  const remote = await cloudRequest('');
  if (remote) {
    remote.forEach(row => localStorage.setItem(row.id, JSON.stringify(row.content)));
    loadList();
    toast("Cloud Data Synced", "success");
  }
}

function saveCloudConfig() {
  cloudConfig.key = document.getElementById('cloud_key').value.trim();
  localStorage.setItem('cloudConfig', JSON.stringify(cloudConfig));
  loadFromCloud();
}

function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.innerText = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function loadSettings() {
  return JSON.parse(localStorage.getItem('settings')) || {
    categories:['Senior','Junior'], bowTypes:['Recurve','Compound'],
    rounds:[{name:'WA 18m',distance:18,perEnd:3,total:60}]
  };
}

function persistSettings(s) {
  localStorage.setItem('settings', JSON.stringify(s));
  syncToCloud('settings', s);
}

function loadList() {
  const select = document.getElementById('compSelect');
  select.innerHTML = '';
  const keys = Object.keys(localStorage).filter(k => k.startsWith('comp_')).sort().reverse();
  if (!keys.length) select.innerHTML = '<option value="">-- No Competitions --</option>';
  else keys.forEach(k => {
    const c = JSON.parse(localStorage[k]);
    const opt = document.createElement('option');
    opt.value = k; opt.text = `${c.name} (${c.date})`;
    select.appendChild(opt);
  });
  updateCompButtons();
}

function createCompetition() {
  const name = document.getElementById('compName').value;
  const date = document.getElementById('compDate').value;
  const rIdx = document.getElementById('compRound').value;
  if (!name || !date) return toast("Missing fields", "error");
  const s = loadSettings();
  const id = 'comp_' + Date.now();
  comp = { name, date, round: s.rounds[rIdx], archers: [] };
  localStorage.setItem(id, JSON.stringify(comp));
  syncToCloud(id, comp);
  loadList();
  document.getElementById('compSelect').value = id;
  loadCompetition();
}

function loadCompetition() {
  const id = document.getElementById('compSelect').value;
  comp = JSON.parse(localStorage.getItem(id));
  archers = comp.archers || [];
  document.getElementById('archerPanel').classList.remove('hidden');
  document.getElementById('mainPanel').classList.remove('hidden');
  document.getElementById('roundInfo').classList.remove('hidden');
  renderArchers(); renderRoundInfo(); updateTopTitle();
}

function saveScores() {
  if (!current) return;
  current.scores = [...data];
  const id = document.getElementById('compSelect').value;
  localStorage.setItem(id, JSON.stringify(comp));
  syncToCloud(id, comp);
  unsaved = false; updateSaveState(); renderLeaderboards();
  toast("Saved", "success");
}

function updateTopTitle() {
  const b = document.getElementById('compBanner');
  b.innerText = `${comp.name} | ${comp.round.name}`;
  b.classList.add('visible');
}

function renderRoundInfo() {
  const r = comp.round;
  document.getElementById('roundInfoContent').innerHTML = `<span class="badge">📏 ${r.distance}m</span> <span class="badge">🏹 ${r.perEnd}/end</span>`;
}

function renderArchers() {
  const ul = document.getElementById('archers');
  ul.innerHTML = '';
  archers.forEach(a => {
    const li = document.createElement('li');
    li.innerText = a.name;
    if (current && a.name === current.name) li.classList.add('active');
    li.onclick = () => selectArcher(a);
    ul.appendChild(li);
  });
}

function selectArcher(a) {
  current = a; data = [...(a.scores || [])];
  document.getElementById('active').innerText = a.name;
  document.getElementById('statusBar').classList.remove('hidden');
  document.getElementById('editArcherBtn').classList.remove('hidden');
  document.getElementById('deleteArcherBtn').classList.remove('hidden');
  buildGrid(); renderArchers();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i=0; i<comp.round.total; i++) {
    const inp = document.createElement('input');
    inp.className = 'score-input';
    inp.value = data[i] || '';
    inp.oninput = (e) => {
      data[i] = e.target.value.toUpperCase();
      unsaved = true; updateSaveState(); calc();
    };
    grid.appendChild(inp);
  }
}

function calc() {
  let t = 0;
  data.forEach(v => { if(v) t += (v==='X' ? 10 : parseInt(v)||0); });
  document.getElementById('total').innerText = t;
}

function updateSaveState() {
  const s = document.getElementById('saveState');
  s.classList.remove('hidden');
  s.innerText = unsaved ? "● Unsaved" : "✔ Saved";
  s.className = unsaved ? "save-state unsaved" : "save-state saved";
  document.getElementById('saveBtn').classList.toggle('hidden', !unsaved);
}

function openSettings() {
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('cloud_key').value = cloudConfig.key;
  renderSettingsUI();
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function switchTab(t, b) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-'+t).classList.remove('hidden');
  b.classList.add('active');
}

function toggleTheme() { document.body.classList.toggle('dark'); }
function updateCompButtons() {
  const val = document.getElementById('compSelect').value;
  document.getElementById('loadBtn').disabled = !val;
  document.getElementById('deleteBtn').disabled = !val;
}

function renderSettingsUI() {
  const s = loadSettings();
  const catList = document.getElementById('categoryList');
  catList.innerHTML = '';
  s.categories.forEach(c => {
    const d = document.createElement('div'); d.innerText = c;
    catList.appendChild(d);
  });
}

window.onload = () => {
  loadList();
  const s = loadSettings();
  const rSel = document.getElementById('compRound');
  s.rounds.forEach((r, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.text = r.name;
    rSel.appendChild(opt);
  });
  if (cloudConfig.key) loadFromCloud();
};
</script>
</body>
</html>
